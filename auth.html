<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LipoLand — Вхід</title>
<link rel="icon" href="/favicon.png" type="image/png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root { --pink: #C91B6E; --teal: #4CBCBE; --yellow: #F2C031; --orange: #E89240; --dark: #2D2D2D; --light: #FDFBF7; --gray: #7A7A7A; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',system-ui,sans-serif; color:var(--dark); background:var(--light); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.auth-container { width:100%; max-width:420px; padding:20px; }
.auth-card { background:#fff; border-radius:20px; padding:40px 32px; box-shadow:0 8px 40px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.04); }
.logo { text-align:center; margin-bottom:32px; }
.logo img { width:56px; height:56px; border-radius:50%; margin-bottom:12px; }
.logo h1 { font-size:24px; font-weight:900; color:var(--pink); margin-bottom:4px; }
.logo p { font-size:14px; color:var(--gray); }
.tabs { display:flex; margin-bottom:28px; border-radius:12px; background:rgba(0,0,0,0.03); padding:4px; }
.tab { flex:1; padding:10px; text-align:center; font-weight:700; font-size:15px; border-radius:10px; cursor:pointer; color:var(--gray); transition:all .2s; border:none; background:none; }
.tab.active { background:#fff; color:var(--pink); box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:700; color:var(--gray); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input { width:100%; padding:12px 16px; border:2px solid rgba(0,0,0,0.08); border-radius:12px; font-size:15px; font-family:inherit; transition:border-color .2s; background:#fff; }
.form-group input:focus { outline:none; border-color:var(--pink); }
.form-group input::placeholder { color:#bbb; }
.btn { width:100%; padding:14px; border-radius:12px; font-weight:700; font-size:16px; border:none; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-primary { background:var(--pink); color:#fff; box-shadow:0 4px 20px rgba(201,27,110,0.3); margin-top:8px; }
.btn-primary:hover { background:#A8155B; transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
.btn-google { background:#fff; color:var(--dark); border:2px solid rgba(0,0,0,0.08); margin-top:12px; }
.btn-google:hover { border-color:var(--pink); background:rgba(201,27,110,0.02); }
.btn-google svg { width:20px; height:20px; }
.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.08); }
.divider span { font-size:13px; color:var(--gray); font-weight:600; }
.promo-toggle { text-align:center; margin-top:12px; }
.promo-toggle a { font-size:13px; color:var(--teal); font-weight:600; cursor:pointer; text-decoration:none; }
.promo-toggle a:hover { text-decoration:underline; }
.promo-field { display:none; margin-top:12px; }
.promo-field.show { display:block; }
.error-msg { background:rgba(201,27,110,0.08); color:var(--pink); padding:10px 16px; border-radius:10px; font-size:14px; font-weight:600; margin-bottom:16px; display:none; }
.error-msg.show { display:block; }
.success-msg { background:rgba(76,188,190,0.1); color:var(--teal); padding:10px 16px; border-radius:10px; font-size:14px; font-weight:600; margin-bottom:16px; display:none; }
.success-msg.show { display:block; }
.footer-links { text-align:center; margin-top:20px; font-size:13px; color:var(--gray); }
.footer-links a { color:var(--pink); font-weight:600; text-decoration:none; }
.checkbox-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:16px; font-size:13px; color:var(--gray); }
.checkbox-row input[type=checkbox] { margin-top:2px; accent-color:var(--pink); }
.checkbox-row a { color:var(--pink); }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQW7b7lDuX9_YMpD2F7ayKrhtZLV8B-yUyf9A&s" alt="LipoLand">
      <h1>LipoLand</h1>
      <p>Система управління для майстрів ліпучок</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Увійти</button>
      <button class="tab" onclick="switchTab('register')">Реєстрація</button>
    </div>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="ваша@пошта.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="Введіть пароль" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Увійти</button>
      <div class="divider"><span>або</span></div>
      <button type="button" class="btn btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Увійти через Google
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Ваше ім'я</label>
        <input type="text" id="reg-name" placeholder="Як вас звати?" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ваша@пошта.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="reg-password" placeholder="Мінімум 6 символів" required minlength="6">
      </div>
      <div class="form-group">
        <label>Підтвердіть пароль</label>
        <input type="password" id="reg-password2" placeholder="Повторіть пароль" required minlength="6">
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="reg-terms" required>
        <span>Я погоджуюсь з <a href="/legal#terms" target="_blank">умовами використання</a> та <a href="/legal#privacy" target="_blank">політикою конфіденційності</a></span>
      </div>
      <div class="promo-toggle">
        <a onclick="document.getElementById('promo-field').classList.toggle('show')">Маю промокод</a>
      </div>
      <div id="promo-field" class="promo-field">
        <div class="form-group" style="margin-top:8px;">
          <label>Промокод</label>
          <input type="text" id="reg-promo" placeholder="Введіть промокод" style="text-transform:uppercase;">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="reg-btn">Створити акаунт</button>
      <div class="divider"><span>або</span></div>
      <button type="button" class="btn btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Зареєструватись через Google
      </button>
    </form>
  </div>

  <div class="footer-links">
    <a href="/">На головну</a>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('error').classList.remove('show');
  document.getElementById('success').classList.remove('show');
  if (tab === 'login') {
    document.querySelector('.tab:first-child').classList.add('active');
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
  } else {
    document.querySelector('.tab:last-child').classList.add('active');
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  }
}

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('success').classList.remove('show');
}

function showSuccess(msg) {
  var el = document.getElementById('success');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('error').classList.remove('show');
}

async function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Входимо...';
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value.trim().toLowerCase(),
        password: document.getElementById('login-password').value
      })
    });
    var data = await res.json();
    if (data.ok) {
      window.location.href = '/app';
    } else {
      showError(data.error || 'Помилка входу');
    }
  } catch (err) {
    showError('Помилка з\'єднання з сервером');
  }
  btn.disabled = false;
  btn.textContent = 'Увійти';
}

async function handleRegister(e) {
  e.preventDefault();
  var pass = document.getElementById('reg-password').value;
  var pass2 = document.getElementById('reg-password2').value;
  if (pass !== pass2) { showError('Паролі не співпадають'); return; }
  if (pass.length < 6) { showError('Пароль має бути мінімум 6 символів'); return; }
  if (!document.getElementById('reg-terms').checked) { showError('Погодьтесь з умовами використання'); return; }
  var btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Реєструємо...';
  try {
    var res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('reg-name').value.trim(),
        email: document.getElementById('reg-email').value.trim().toLowerCase(),
        password: pass,
        promo: document.getElementById('reg-promo').value.trim().toUpperCase()
      })
    });
    var data = await res.json();
    if (data.ok) {
      window.location.href = '/app';
    } else {
      showError(data.error || 'Помилка реєстрації');
    }
  } catch (err) {
    showError('Помилка з\'єднання з сервером');
  }
  btn.disabled = false;
  btn.textContent = 'Створити акаунт';
}

function googleLogin() {
  window.location.href = '/api/auth/google';
}

// Auto-switch to register if URL has ?register
if (window.location.search.includes('register')) switchTab('register');
</script>

</body>
</html>
